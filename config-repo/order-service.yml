spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/orderdb
    username: admin
    password: password
  kafka:
    bootstrap-servers: localhost:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  dynamic:
    message: "Default message from config repo (can be refreshed dynamically)"

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: refresh, health, prometheus, info
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0
